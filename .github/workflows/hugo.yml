name: Build and Deploy Hugo Site

on:
  push:
    branches:
      - main  # triggers on pushes to main

jobs:
  build:
    runs-on: ubuntu-latest

    # Cache configuration
    caches:
      images:
        dir: :cacheDir/images

    steps:
      # 1️⃣ Checkout the repository and submodules
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          submodules: true  # important for PaperMod theme

      # 2️⃣ Setup Hugo Extended version
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.111.3'  # latest extended version
          extended: true

      # 3️⃣ Install Hugo modules (if any)
      - name: Install Hugo Modules
        run: hugo mod get

      # 4️⃣ Build the site
      - name: Build
        run: hugo -D

      # 5️⃣ Deploy to GitHub Pages
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          # Optional: branch: gh-pages  # default is gh-pages
